<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="献立帳">
<meta name="theme-color" content="#B85C2A">
<link rel="manifest" href="manifest.json">
<title>献立帳</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F1EB;--surface:#FEFCF8;--surface2:#EDE8DF;
  --accent:#B85C2A;--accent-l:#F2E4D8;
  --green:#5A8C4A;--green-l:#DFF0D8;
  --blue:#3A6EA8;--blue-l:#D8E8F5;
  --text:#1C1814;--text2:#6B5F55;--text3:#A8998E;
  --border:#D8D0C5;--danger:#B84040;
  --nav-h:60px;--safe-b:env(safe-area-inset-bottom,0px);
  --r:14px;--r-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column}

/* SETUP OVERLAY */
.setup-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;width:100%;max-width:400px}
.setup-logo{font-size:32px;text-align:center;margin-bottom:8px}
.setup-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:4px}
.setup-sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px}
.setup-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;display:block}
.setup-input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);margin-bottom:16px}
.setup-input:focus{outline:none;border-color:var(--blue)}
.setup-btn{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:var(--r-sm);font-size:15px;font-family:inherit;font-weight:500;cursor:pointer}
.setup-note{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;line-height:1.6}

/* HEADER */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:50}
.hdr-logo{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;color:var(--accent)}
.week-nav{display:flex;align-items:center;gap:6px}
.week-btn{background:var(--surface2);border:none;border-radius:6px;width:28px;height:28px;display:grid;place-items:center;cursor:pointer;font-size:15px;color:var(--text2)}
.week-btn:active{background:var(--border)}
.week-lbl{font-size:11px;color:var(--text2);text-align:center;line-height:1.4;min-width:90px}
.week-lbl strong{display:block;font-size:12px;color:var(--text);font-weight:500}

/* SYNC STATUS */
.sync-bar{height:28px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 14px;flex-shrink:0}
.sync-status{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:6px;height:6px;border-radius:99px;background:var(--text3)}
.sync-dot.ok{background:var(--green)}
.sync-dot.syncing{background:var(--accent);animation:pulse 1s infinite}
.sync-dot.err{background:var(--danger)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-btn{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:inherit;font-weight:500}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px calc(var(--nav-h) + var(--safe-b) + 16px)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--safe-b));background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-b);z-index:100}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border:none;background:none;cursor:pointer;padding:8px 0 4px;color:var(--text3)}
.bnav-btn.active{color:var(--accent)}
.bnav-icon{font-size:21px;line-height:1}
.bnav-label{font-size:10px;font-weight:500}

/* PAGE */
.page{display:none}.page.active{display:block}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px}
.card-hd{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;display:flex;align-items:center;justify-content:space-between}
.pill{display:inline-flex;align-items:center;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.pill-o{background:var(--accent-l);color:var(--accent)}
.pill-g{background:var(--green-l);color:var(--green)}
.pill-b{background:var(--blue-l);color:var(--blue)}

/* MENU */
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.day-hd{display:flex;align-items:center;gap:8px;padding:10px 13px;background:var(--surface2);cursor:pointer;user-select:none}
.day-lbl{font-family:'DM Mono',monospace;font-size:14px;font-weight:500;min-width:22px}
.day-date{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.day-body{padding:9px 13px;display:grid;gap:6px}
.meal-row{display:grid;grid-template-columns:30px 1fr auto;align-items:start;gap:7px;font-size:13px}
.meal-t{font-size:10px;color:var(--text3);font-weight:500;padding-top:2px}
.meal-n{line-height:1.5}
.day-card.collapsed .day-body{display:none}
.tog{margin-left:auto;font-size:11px;color:var(--text3);transition:transform .2s}
.day-card:not(.collapsed) .tog{transform:rotate(180deg)}

/* SHOP */
.trip-hd{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px}
.shop-item{display:grid;grid-template-columns:30px 1fr 50px 72px;align-items:center;gap:7px;padding:8px 11px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:4px;transition:opacity .2s}
.shop-item.done{opacity:.4}
.shop-item.done .sname{text-decoration:line-through}
.schk{width:19px;height:19px;border-radius:5px;border:1.5px solid var(--border);appearance:none;cursor:pointer;display:grid;place-items:center;transition:all .15s;flex-shrink:0}
.schk:checked{background:var(--green);border-color:var(--green)}
.schk:checked::after{content:'✓';color:#fff;font-size:11px}
.sname{font-size:13px}
.samt{font-size:11px;color:var(--text3);text-align:right}
.sinput{font-size:12px;font-family:'DM Mono',monospace;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 6px;width:100%;color:var(--text);text-align:right}
.sinput:focus{outline:none;border-color:var(--blue)}
.trip-footer{display:flex;justify-content:space-between;font-size:12px;padding:5px 2px;color:var(--text2);font-family:'DM Mono',monospace}

/* BUDGET */
.bsum{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:13px}
.bcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);padding:11px 8px;text-align:center}
.bcard .num{font-family:'DM Mono',monospace;font-size:17px;font-weight:500}
.bcard .lbl{font-size:10px;color:var(--text2);margin-top:3px}
.bcard.ok .num{color:var(--green)}
.bcard.warn .num{color:var(--accent)}
.bcard.over .num{color:var(--danger)}
.bar-wrap{background:var(--surface2);border-radius:99px;height:7px;overflow:hidden;margin:7px 0 3px}
.bar-fill{height:7px;border-radius:99px;transition:width .5s;background:var(--green)}
.bar-fill.warn{background:var(--accent)}
.bar-fill.over{background:var(--danger)}
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.hist-item:last-child{border-bottom:none}

/* RECIPE */
.rcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.rhd{padding:12px 13px;cursor:pointer;display:flex;align-items:center;justify-content:space-between}
.rtitle{font-size:14px;font-weight:500}
.rsub{font-size:11px;color:var(--text3);margin-top:2px}
.rbody{padding:0 13px 13px;border-top:1px solid var(--border);display:none}
.rlbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:11px 0 5px}
.ingr-wrap{display:flex;flex-wrap:wrap;gap:5px}
.ingr{font-size:12px;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:3px 9px}
.ingr strong{color:var(--accent);font-weight:500}
.steps{list-style:none;display:grid;gap:7px}
.steps li{display:grid;grid-template-columns:20px 1fr;gap:8px;font-size:13px;line-height:1.6}
.step-n{width:20px;height:20px;border-radius:99px;background:var(--accent);color:#fff;font-size:10px;display:grid;place-items:center;flex-shrink:0;margin-top:2px;font-family:'DM Mono',monospace}
.tip{margin-top:9px;padding:9px 11px;background:var(--accent-l);border-radius:var(--r-sm);font-size:12px;color:var(--text2);border-left:3px solid var(--accent)}

/* AI CHAT */
.ai-page{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:200;display:none;flex-direction:column}
.ai-page.active{display:flex}
.ai-hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ai-hdr-title{font-size:15px;font-weight:500}
.ai-hdr-sub{font-size:11px;color:var(--text3)}
.chat-msgs{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:0}
.chat-foot{padding:10px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(10px + var(--safe-b))}
.chat-row{display:flex;gap:8px;align-items:flex-end}
.chat-row.user{flex-direction:row-reverse}
.bubble{max-width:82%;padding:10px 13px;border-radius:16px;font-size:13px;line-height:1.7;word-break:break-word}
.bubble.ai{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble.user{background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.bubble.thinking{color:var(--text3);font-style:italic}
.av{width:28px;height:28px;border-radius:99px;background:var(--accent-l);display:grid;place-items:center;font-size:13px;flex-shrink:0}
.quick-btns{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;margin-bottom:8px;-webkit-overflow-scrolling:touch;scrollbar-width:none}.quick-btns::-webkit-scrollbar{display:none}
.qbtn{font-size:11px;padding:5px 10px;border-radius:99px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap}
.qbtn:active{background:var(--surface2)}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{flex:1;border:1px solid var(--border);border-radius:12px;padding:10px 13px;font-size:14px;font-family:inherit;background:var(--bg);color:var(--text);resize:none;min-height:42px;max-height:100px;line-height:1.5}
.chat-input:focus{outline:none;border-color:var(--blue)}
.send-btn{width:42px;height:42px;border-radius:12px;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;display:grid;place-items:center;flex-shrink:0}
.send-btn:disabled{opacity:.4}
.apply-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;padding:7px 13px;background:var(--green);color:#fff;border:none;border-radius:var(--r-sm);font-size:12px;font-family:inherit;cursor:pointer;font-weight:500}
.apply-btn:disabled{opacity:.5}

/* MISC */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:11px}
.sec-title{font-size:17px;font-weight:700}
.btn{padding:7px 14px;border-radius:var(--r-sm);border:none;font-size:12px;font-family:inherit;cursor:pointer;font-weight:500}
.btn-p{background:var(--accent);color:#fff}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
</style>
</head>
<body>

<!-- SETUP OVERLAY -->
<div class="setup-overlay" id="setup-overlay" style="display:none">
  <div class="setup-card">
    <div class="setup-logo">🍱</div>
    <div class="setup-title">献立帳へようこそ</div>
    <div class="setup-sub">初回設定：APIキーを入力してください</div>
    <label class="setup-label">Gemini API キー</label>
    <input class="setup-input" id="setup-gemini" type="password" placeholder="AIza...">
    <label class="setup-label">Firebase Database URL</label>
    <input class="setup-input" id="setup-fb" type="text" placeholder="https://xxx.firebasedatabase.app" value="https://ai-cook-d2626-default-rtdb.asia-southeast1.firebasedatabase.app">
    <button class="setup-btn" onclick="saveSetup()">設定を保存して始める</button>
    <div class="setup-note">キーはこの端末のみに保存されます。<br>GitHubやサーバーには送信されません。</div>
  </div>
</div>

<!-- MAIN UI -->
<header class="hdr" id="main-hdr" style="display:none">
  <div class="hdr-logo">🍱 献立帳</div>
  <div class="week-nav">
    <button class="week-btn" onclick="changeWeek(-1)">‹</button>
    <div class="week-lbl" id="week-lbl"><strong>今週</strong><span>--/-- 〜 --/--</span></div>
    <button class="week-btn" onclick="changeWeek(1)">›</button>
  </div>
</header>

<div class="sync-bar" id="sync-bar" style="display:none">
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-msg">接続中...</span>
  </div>
  <button class="sync-btn" onclick="syncNow()">↑ 今すぐ同期</button>
</div>

<div class="scroll" id="main-scroll" style="display:none">
  <div id="page-menu" class="page active">
    <div class="sec-hd">
      <div class="sec-title">今週の献立</div>
      <button class="btn btn-s" onclick="openAI()">🤖 AIで更新</button>
    </div>
    <div id="menu-list"></div>
  </div>

  <div id="page-shop" class="page">
    <div class="sec-hd">
      <div class="sec-title">買い出しリスト</div>
      <button class="btn btn-s" onclick="resetChecks()">リセット</button>
    </div>
    <div id="shop-list"></div>
  </div>

  <div id="page-budget" class="page">
    <div class="sec-hd"><div class="sec-title">予算管理</div></div>
    <div class="bsum" id="bsum"></div>
    <div class="card">
      <div class="card-hd">週の予算目標</div>
      <div style="display:flex;align-items:center;gap:8px">
        <input type="number" id="budget-inp" class="sinput" placeholder="4200" style="width:100%;padding:10px;font-size:15px;border-radius:10px" oninput="saveBudget()">
        <span style="font-size:14px;color:var(--text2)">円</span>
      </div>
    </div>
    <div class="card" id="budget-detail"></div>
    <div class="card">
      <div class="card-hd">過去の支出履歴</div>
      <div id="hist-list"></div>
    </div>
  </div>

  <div id="page-recipe" class="page">
    <div class="sec-hd"><div class="sec-title">レシピ</div></div>
    <div id="recipe-list"></div>
  </div>
</div>

<!-- AI CHAT -->
<div class="ai-page" id="ai-page">
  <div class="ai-hdr">
    <div>
      <div class="ai-hdr-title">🤖 献立AIアシスタント</div>
      <div class="ai-hdr-sub" id="ai-model-lbl">Gemini 2.0 Flash</div>
    </div>
    <button class="btn btn-s" onclick="closeAI()">✕ 閉じる</button>
  </div>
  <div class="chat-msgs" id="chat-msgs"></div>
  <div class="chat-foot">
    <div class="quick-btns">
      <button class="qbtn" onclick="quickSend('今週のメニューを提案して')">📋 今週の提案</button>
      <button class="qbtn" onclick="quickSend('先週と被らないメニューにして')">🔄 重複を避けて</button>
      <button class="qbtn" onclick="quickSend('つまみ系を増やして')">🍺 つまみ増量</button>
      <button class="qbtn" onclick="quickSend('今週の買い物リストを整理して')">🛒 買い物整理</button>
    </div>
    <div class="chat-input-row">
      <textarea class="chat-input" id="chat-input" placeholder="献立について相談する…" rows="1" onkeydown="chatKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendChat()">↑</button>
    </div>
  </div>
</div>

<nav class="bnav" id="main-bnav" style="display:none">
  <button class="bnav-btn active" data-p="menu" onclick="showPage('menu',this)">
    <span class="bnav-icon">📅</span><span class="bnav-label">献立</span>
  </button>
  <button class="bnav-btn" data-p="shop" onclick="showPage('shop',this)">
    <span class="bnav-icon">🛒</span><span class="bnav-label">買い出し</span>
  </button>
  <button class="bnav-btn" data-p="budget" onclick="showPage('budget',this)">
    <span class="bnav-icon">💴</span><span class="bnav-label">予算</span>
  </button>
  <button class="bnav-btn" data-p="recipe" onclick="showPage('recipe',this)">
    <span class="bnav-icon">🍳</span><span class="bnav-label">レシピ</span>
  </button>
  <button class="bnav-btn" data-p="ai" onclick="openAI()">
    <span class="bnav-icon">🤖</span><span class="bnav-label">AI相談</span>
  </button>
</nav>

<script>
// ═══════════════════════ CONSTANTS ═══════════════════════
const FB_PATH = '/kendate';
const DAYS = ['日','月','火','水','木','金','土'];

const DEFAULT_MENU = [
  {day:'月',badges:[{t:'買い出し①',c:'g'}],meals:[
    {t:'朝',n:'トースト＋ハムエッグ',ts:false},
    {t:'昼',n:'醤油ラーメン（卵・ねぎトッピング）',ts:false},
    {t:'夜',n:'鶏もも醤油バター炒め・キャベツ千切り・味噌汁',ts:true}]},
  {day:'火',badges:[],meals:[
    {t:'朝',n:'ご飯＋卵かけごはん or 納豆',ts:false},
    {t:'昼',n:'冷凍うどん（めんつゆ・天かす）',ts:false},
    {t:'夜',n:'豚こま回鍋肉風・ご飯・味噌汁',ts:true}]},
  {day:'水',badges:[],meals:[
    {t:'朝',n:'トースト＋目玉焼き',ts:false},
    {t:'昼',n:'焼きそば（豚こま・もやし）',ts:false},
    {t:'夜',n:'さつま揚げ炒め煮・大根浅漬け・ご飯',ts:true}]},
  {day:'木',badges:[{t:'買い出し②',c:'g'}],meals:[
    {t:'朝',n:'ご飯＋納豆 or 卵焼き',ts:false},
    {t:'昼',n:'冷凍うどん（卵・天かす）',ts:false},
    {t:'夜',n:'豚バラじゃがいも煮物・ご飯・もやし味噌汁',ts:true}]},
  {day:'金',badges:[],meals:[
    {t:'朝',n:'トースト＋ハムエッグ',ts:false},
    {t:'昼',n:'木曜の煮物残り＋ご飯',ts:false},
    {t:'夜',n:'豆腐ステーキ ポン酢バター・もやしナムル',ts:true}]},
  {day:'土',badges:[{t:'作り置き',c:'o'}],meals:[
    {t:'朝',n:'ご飯＋目玉焼き・納豆',ts:false},
    {t:'昼',n:'ちゃんぽん風ラーメン（冷凍野菜・豚こま）',ts:false},
    {t:'夜',n:'黒豚しゃぶしゃぶ（ポン酢・ごまだれ）',ts:true},
    {t:'仕込',n:'唐揚げ冷凍・ひじき煮・きんぴら',ts:false}]},
  {day:'日',badges:[{t:'作り置き',c:'o'}],meals:[

    {t:'昼',n:'チャーハン（ご飯消費）',ts:false},
    {t:'夜',n:'豚キムチ鍋（残り野菜全投入）〆雑炊',ts:true},
    {t:'仕込',n:'麻婆豆腐・卵そぼろ（冷凍）',ts:false}]},
];

const DEFAULT_SHOP = [

// ═══════════════════════ WEEK ═══════════════════════
let weekOffset = 0;

function weekKey(offset=0){
  const d=new Date();
  const mon=new Date(d);
  mon.setDate(d.getDate()-((d.getDay()+6)%7)+offset*7);
  mon.setHours(0,0,0,0);
  return mon.toISOString().slice(0,10);
}

function weekDates(mondayStr){
  const mon=new Date(mondayStr);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}

function fmt(d){return `${d.getMonth()+1}/${d.getDate()}`;}
function fmtWeek(k){const ds=weekDates(k);return `${fmt(ds[0])}〜${fmt(ds[6])}`;}

function updateHeader(){
  const key=weekKey(weekOffset);
  const lbl=weekOffset===0?'今週':weekOffset<0?`${Math.abs(weekOffset)}週前`:`${weekOffset}週後`;
  document.getElementById('week-lbl').innerHTML=`<strong>${lbl}</strong><span>${fmtWeek(key)}</span>`;
}

function changeWeek(d){
  weekOffset+=d;
  updateHeader();
  renderAll();
}

function curKey(){return weekKey(weekOffset);}

function curData(){
  const all=ls('weeks',{});
  const k=curKey();
  if(!all[k]){
    all[k]={menu:JSON.parse(JSON.stringify(DEFAULT_MENU)),shop:JSON.parse(JSON.stringify(DEFAULT_SHOP)),checks:{},actuals:{},budget:ls('budget_target',4200)};
    ss('weeks',all);
  }
  return all[k];
}

function saveData(data){
  const all=ls('weeks',{});
  all[curKey()]=data;
  ss('weeks',all);
}

// ═══════════════════════ FIREBASE SYNC ═══════════════════════
let syncTimer=null;

function setSyncStatus(state,msg){
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-msg');
  dot.className='sync-dot '+state;
  txt.textContent=msg;
}

async function initFirebase(){
  setSyncStatus('syncing','接続中...');
  await pullFromFirebase();
  renderAll();
}

async function pullFromFirebase(){
  if(!FB_URL)return;
  try{
    const res=await fetch(`${FB_URL}${FB_PATH}.json`);
    if(!res.ok)throw new Error();
    const remote=await res.json();
    if(remote && remote.weeks){
      const local=ls('weeks',{});
      // merge: remote wins for keys that exist remotely
      const merged={...local,...remote.weeks};
      ss('weeks',merged);
    }
    setSyncStatus('ok','同期済み');
  }catch(e){
    setSyncStatus('err','オフライン');
  }
}

async function pushToFirebase(){
  if(!FB_URL)return;
  setSyncStatus('syncing','同期中...');
  try{
    const weeks=ls('weeks',{});
    const res=await fetch(`${FB_URL}${FB_PATH}/weeks.json`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(weeks)
    });
    if(!res.ok)throw new Error();
    setSyncStatus('ok',`同期済み ${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}`);
  }catch(e){
    setSyncStatus('err','同期失敗');
  }
}

function scheduleSync(){
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(pushToFirebase,2000);
}

function syncNow(){
  pushToFirebase();
}

// ═══════════════════════ RENDER BUDGET ═══════════════════════
function renderBudget(){
  const data=curData();
  const target=parseInt(document.getElementById('budget-inp')?.value||data.budget)||4200;
  let est=0,act=0,hasAct=false;
  data.shop.forEach((trip,ti)=>trip.items.forEach((item,ii)=>{
    est+=item.e;
    const v=data.actuals[`${ti}-${ii}`];
    if(v!==''&&v!==undefined){act+=parseInt(v);hasAct=true;}
  }));
  const spent=hasAct?act:0;
  const pct=target>0?Math.min(spent/target*100,100):0;
  const diff=target-spent;
  const cls=pct<70?'ok':pct<95?'warn':'over';
  document.getElementById('bsum').innerHTML=`
    <div class="bcard"><div class="num">¥${target.toLocaleString()}</div><div class="lbl">週の予算</div></div>
    <div class="bcard ${hasAct?cls:''}"><div class="num">${hasAct?'¥'+spent.toLocaleString():'—'}</div><div class="lbl">実績支出</div></div>
    <div class="bcard ${hasAct?(diff>=0?'ok':'over'):''}"><div class="num">${hasAct?(diff>=0?'+':'')+diff.toLocaleString()+'円':'—'}</div><div class="lbl">${hasAct?(diff>=0?'残り':'オーバー'):'入力待ち'}</div></div>`;

  const bd=document.getElementById('budget-detail');
  if(bd){
    const barCls=pct>=95?'over':pct>=75?'warn':'';
    bd.innerHTML=`<div class="card-hd">支出内訳</div>
      <div class="bar-wrap"><div class="bar-fill ${barCls}" style="width:${pct.toFixed(1)}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:11px"><span>¥0</span><span>${hasAct?Math.round(pct)+'%':''}</span><span>¥${target.toLocaleString()}</span></div>
      ${data.shop.map((trip,ti)=>{
        let te=0,ta=0,has=false;
        trip.items.forEach((item,ii)=>{te+=item.e;const v=data.actuals[`${ti}-${ii}`];if(v!==''&&v!==undefined){ta+=parseInt(v);has=true;}});
        return `<div class="hist-item"><span>${trip.trip}</span><span style="font-family:'DM Mono',monospace">${has?'¥'+ta.toLocaleString():'¥'+te+' (予算)'}</span></div>`;
      }).join('')}
      <div class="hist-item" style="font-weight:500"><span>週計</span><span style="font-family:'DM Mono',monospace">¥${(hasAct?act:est).toLocaleString()}${hasAct?'':' (予算)'}</span></div>`;
  }

  const all=ls('weeks',{});
  const keys=Object.keys(all).sort().reverse().filter(k=>k!==curKey());
  const hl=document.getElementById('hist-list');
  if(hl){
    if(!keys.length){hl.innerHTML='<div style="font-size:13px;color:var(--text3);padding:12px 0">過去の履歴はまだありません</div>';return;}
    hl.innerHTML=keys.slice(0,8).map(k=>{
      const wd=all[k];let tot=0,has=false;
      if(wd.shop)wd.shop.forEach((trip,ti)=>trip.items.forEach((item,ii)=>{
        const v=wd.actuals?.[`${ti}-${ii}`];
        if(v!==''&&v!==undefined){tot+=parseInt(v);has=true;}
      }));
      return `<div class="hist-item"><span style="font-size:12px;color:var(--text2)">${fmtWeek(k)}</span><span style="font-family:'DM Mono',monospace">${has?'¥'+tot.toLocaleString():'—'}</span></div>`;
    }).join('');
  }
}

  const v=parseInt(document.getElementById('budget-inp').value)||4200;
  const data=curData();data.budget=v;saveData(data);ss('budget_target',v);

let chatHistory=[];
let chatReady=false;

function initChat(){
  chatReady=true;
  chatHistory=ls('chat_hist',[]);
  const msgs=document.getElementById('chat-msgs');
  msgs.innerHTML='';
  if(!chatHistory.length){
    addBubble('ai','こんにちは！献立AIアシスタントです🍱\n\n今週の献立提案、買い物リスト整理、リピート防止など何でも相談してください！');
  } else {
    chatHistory.forEach(m=>addBubble(m.role,m.content,true));
  }
  setTimeout(()=>msgs.scrollTo(0,99999),100);
}

function addBubble(role,text,noSave=false){
  const msgs=document.getElementById('chat-msgs');
  const isAI=role==='ai'||role==='assistant';
  const div=document.createElement('div');
  div.className=`chat-row ${isAI?'':'user'}`;
  let html=text.replace(/\n/g,'<br>');
  const match=text.match(/\[APPLY_MENU:([\s\S]*?)\]END/);
  if(match){
    div.dataset.mj=match[1];
    html=html.replace(/\[APPLY_MENU:[\s\S]*?\]END/g,'');
    html+=`<br><button class="apply-btn" onclick="applyMenu(this)">✅ この献立を反映する</button>`;
  }
  div.innerHTML=`${isAI?'<div class="av">🍱</div>':''}<div class="bubble ${isAI?'ai':'user'}">${html}</div>${!isAI?'<div class="av" style="background:var(--blue-l)">👤</div>':''}`;
  msgs.appendChild(div);
  msgs.scrollTo({top:99999,behavior:'smooth'});
  if(!noSave){
    chatHistory.push({role:isAI?'assistant':'user',content:text});
    if(chatHistory.length>30)chatHistory=chatHistory.slice(-30);
    ss('chat_hist',chatHistory);
  }
}

function applyMenu(btn){
  const row=btn.closest('.chat-row');
  try{
    const menuArr=JSON.parse(row.dataset.mj);
    const data=curData();
    data.menu=menuArr;
    saveData(data);
    renderMenu();
    addBubble('ai','✅ 献立を反映しました！献立タブで確認してください。');
    btn.disabled=true;btn.textContent='反映済み';
    scheduleSync();
  }catch(e){
    addBubble('ai','反映に失敗しました。もう一度試してください。');
  }
}

async function sendChat(){
  const inp=document.getElementById('chat-input');
  const text=inp.value.trim();
  if(!text)return;
  inp.value='';autoResize(inp);
  document.getElementById('send-btn').disabled=true;
  addBubble('user',text);

  const msgs=document.getElementById('chat-msgs');
  const th=document.createElement('div');
  th.className='chat-row';
  th.innerHTML='<div class="av">🍱</div><div class="bubble ai thinking">考え中…</div>';
  msgs.appendChild(th);msgs.scrollTo(0,99999);

  const data=curData();
  const menuSummary=data.menu.map(d=>`${d.day}: ${d.meals.map(m=>m.n).join('、')}`).join('\n');
  const allWeeks=ls('weeks',{});
  const pastMenus=Object.entries(allWeeks).filter(([k])=>k!==curKey()).sort().reverse().slice(0,3)
    .map(([k,v])=>`【${fmtWeek(k)}】\n${v.menu?.map(d=>`${d.day}: ${d.meals?.map(m=>m.n).join('、')}`).join('\n')||'なし'}`).join('\n\n');

  const system=`あなたは鹿児島在住の一人暮らし向け節約献立アシスタントです。
【ユーザー条件】
・2口ガスコンロ・電子レンジ（オーブン付き）、冷蔵庫小（冷蔵110L・冷凍43L）
・コスパ・ボリューム（1.5人前）優先、お酒のつまみになるメニューが好き
・鹿児島のスーパーで入手できる食材（さつま揚げ・黒豚など地元食材も活用）
・週2回買い出し（月・木）、朝は軽め、昼は時短、夜はがっつり1.5人前
・食費目安：週3,500〜4,200円

【今週（${fmtWeek(curKey())}）の現在の献立】
${menuSummary}

【過去の献立（直近3週）】
${pastMenus||'まだ履歴なし'}

献立を提案する場合は以下の形式でJSONを含めること（必ず]ENDで終わること）：
[APPLY_MENU:[{"day":"月","badges":[{"t":"買い出し①","c":"g"}],"meals":[{"t":"朝","n":"料理名","ts":false},{"t":"昼","n":"料理名","ts":false},{"t":"夜","n":"料理名","ts":true}]},{"day":"火","badges":[],"meals":[...]},{"day":"水","badges":[],"meals":[...]},{"day":"木","badges":[{"t":"買い出し②","c":"g"}],"meals":[...]},{"day":"金","badges":[],"meals":[...]},{"day":"土","badges":[{"t":"作り置き","c":"o"}],"meals":[...]},{"day":"日","badges":[{"t":"作り置き","c":"o"}],"meals":[...]}]]END
会話・質問には通常の文章で回答し、献立提案のときだけJSONを含める。`;

  const messages=chatHistory.slice(-10).map(m=>({role:m.role==='ai'?'assistant':m.role,content:m.content}));

  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:system}]},
        contents:[...messages.map(m=>({role:m.role==='assistant'?'model':'user',parts:[{text:m.content}]})),{role:'user',parts:[{text}]}],
        generationConfig:{maxOutputTokens:1200,temperature:0.7}
      })
    });
    const json=await res.json();
    th.remove();
    if(json.error){addBubble('ai',`エラー: ${json.error.message}`);return;}
    const reply=json.candidates?.[0]?.content?.parts?.[0]?.text||'応答を取得できませんでした。';
    addBubble('ai',reply);
  }catch(e){
    th.remove();
    addBubble('ai','通信エラーが発生しました。ネット接続とAPIキーを確認してください。');
  }
  document.getElementById('send-btn').disabled=false;
}

function quickSend(t){document.getElementById('chat-input').value=t;sendChat();}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}

// ═══════════════════════ INIT ═══════════════════════
function renderAll(){renderMenu();renderShop();renderRecipes();}

checkSetup();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
