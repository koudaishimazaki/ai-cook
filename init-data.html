<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Firebase 初期データ書き込みツール</title>
<style>
body{font-family:sans-serif;max-width:500px;margin:40px auto;padding:20px;background:#f5f5f5}
.card{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
h2{font-size:18px;margin-bottom:8px}
p{font-size:13px;color:#666;margin-bottom:16px;line-height:1.6}
input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;box-sizing:border-box}
button{width:100%;padding:12px;background:#B85C2A;color:#fff;border:none;border-radius:8px;font-size:15px;cursor:pointer;font-weight:500}
button:disabled{opacity:.5}
.result{margin-top:16px;padding:12px;border-radius:8px;font-size:13px}
.ok{background:#dff0d8;color:#2d6b2d}
.err{background:#f8d7da;color:#721c24}
</style>
</head>
<body>
<div class="card">
  <h2>🍱 献立帳 初期データ書き込み</h2>
  <p>FirebaseにレシピとAjust調味料データを書き込みます。<br>一度だけ実行してください。</p>
  <input type="text" id="fb-url" placeholder="Firebase URL" value="https://ai-cook-d2626-default-rtdb.asia-southeast1.firebasedatabase.app">
  <button onclick="writeData()" id="btn">Firebaseに書き込む</button>
  <div id="result"></div>
</div>
<script>
const DATA = {"recipes": [{"title": "鶏もも醤油バター炒め", "day": "月・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "鶏もも肉", "q": "225g"}, {"n": "キャベツ", "q": "1/4玉"}, {"n": "醤油", "q": "大さじ1.5"}, {"n": "バター", "q": "10g"}, {"n": "にんにく", "q": "1片"}, {"n": "塩コショウ", "q": "少々"}], "steps": ["鶏もも肉を一口大に切り塩コショウで下味。", "皮目から中火で3分焼く。", "裏返してにんにく加え2分。", "醤油・バターを絡めてキャベツを30秒炒めて完成。"], "tip": "バターは最後に入れると香りが飛ばない。"}, {"title": "豚こま回鍋肉風", "day": "火・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "豚こま肉", "q": "225g"}, {"n": "キャベツ", "q": "1/4玉"}, {"n": "味噌", "q": "大さじ1"}, {"n": "みりん", "q": "大さじ1"}, {"n": "醤油", "q": "小さじ1"}, {"n": "豆板醤", "q": "小さじ1/2"}, {"n": "にんにく", "q": "1片"}], "steps": ["味噌・みりん・醤油・豆板醤を合わせてたれを作る。", "豚こまを強火で炒め色が変わったらキャベツを加える。", "たれを回しかけて絡めて完成。"], "tip": "たれを先に合わせておくと焦げない。"}, {"title": "さつま揚げ炒め煮", "day": "水・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "さつま揚げ", "q": "1パック"}, {"n": "ごぼう", "q": "1/2本"}, {"n": "醤油", "q": "大さじ1.5"}, {"n": "みりん", "q": "大さじ1.5"}, {"n": "砂糖", "q": "小さじ1"}, {"n": "ごま油", "q": "少々"}], "steps": ["ごぼうはささがきにして水にさらす。", "フライパンにごま油を熱しごぼうを炒める。", "さつま揚げを加えて調味料を入れ汁気がなくなるまで炒め煮。"], "tip": "鹿児島産さつま揚げは炒め煮にすると特に旨い。"}, {"title": "大根の浅漬け", "day": "水・夜（副菜）", "ts": true, "easy": true, "srv": "作り置き3〜4日分", "ingr": [{"n": "大根", "q": "1/3本"}, {"n": "塩", "q": "小さじ1"}, {"n": "酢", "q": "大さじ1"}, {"n": "砂糖", "q": "小さじ1"}, {"n": "昆布", "q": "5cm"}], "steps": ["大根を薄いいちょう切りにして塩をまぶし10分おく。", "水気を絞り、酢・砂糖・昆布と合わせてよく混ぜる。", "冷蔵庫で30分以上おいて完成。3〜4日保存可。"], "tip": "昆布が旨みを出してくれる。"}, {"title": "豚バラじゃがいも煮物", "day": "木・夜", "ts": true, "easy": false, "srv": "1.5人前＋翌昼分", "ingr": [{"n": "豚バラ薄切り", "q": "225g"}, {"n": "じゃがいも", "q": "3個"}, {"n": "醤油", "q": "大さじ2"}, {"n": "みりん", "q": "大さじ2"}, {"n": "砂糖", "q": "大さじ1"}, {"n": "だし", "q": "300ml"}], "steps": ["じゃがいもは大きめ乱切り、豚バラは4cm切り。", "鍋で豚バラを炒め、じゃがいもを加える。", "だし・調味料を入れ落し蓋して中火15分。"], "tip": "多めに作って翌昼に使うのがコスパ最強。"}, {"title": "豆腐ステーキ ポン酢バター", "day": "金・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "木綿豆腐", "q": "1.5丁"}, {"n": "バター", "q": "15g"}, {"n": "ポン酢", "q": "大さじ2"}, {"n": "片栗粉", "q": "大さじ1"}, {"n": "ごま油", "q": "小さじ1"}], "steps": ["豆腐をキッチンペーパーで10分水切り。1.5cm厚に切る。", "両面に片栗粉をまぶす。", "ごま油で両面きつね色に焼く（各2分）。", "バター・ポン酢を絡めて完成。"], "tip": "片栗粉で外カリ中トロに。"}, {"title": "もやしナムル", "day": "金・夜（副菜）", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "もやし", "q": "1袋"}, {"n": "ごま油", "q": "大さじ1"}, {"n": "塩", "q": "小さじ1/2"}, {"n": "鶏ガラスープ", "q": "小さじ1/2"}, {"n": "白ごま", "q": "少々"}], "steps": ["もやしをさっと茹でて（1分）水気をしっかり切る。", "ごま油・塩・鶏ガラスープで和えて白ごまをふる。"], "tip": "水気をしっかり切るのがポイント。"}, {"title": "黒豚しゃぶしゃぶ", "day": "土・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "黒豚しゃぶ用", "q": "200g"}, {"n": "白菜orキャベツ", "q": "1/4個"}, {"n": "豆腐", "q": "1丁"}, {"n": "だし昆布", "q": "10cm"}, {"n": "ポン酢・ごまだれ", "q": "各適量"}], "steps": ["水と昆布を火にかけ沸騰前に昆布を取り出す。", "野菜・豆腐を入れて煮る。", "豚肉をしゃぶしゃぶしてたれで。", "〆はうどんか雑炊がおすすめ。"], "tip": "鹿児島産黒豚は脂の甘みが別格。"}, {"title": "豚キムチ鍋", "day": "日・夜", "ts": true, "easy": true, "srv": "1.5人前", "ingr": [{"n": "豚バラ薄切り", "q": "225g"}, {"n": "キムチ", "q": "150g"}, {"n": "豆腐", "q": "1丁"}, {"n": "もやし", "q": "1袋"}, {"n": "キャベツ", "q": "残り全部"}, {"n": "鶏ガラスープ", "q": "小さじ2"}, {"n": "醤油", "q": "大さじ1"}], "steps": ["ごま油で豚バラとキムチを炒める。", "水500mlと鶏ガラ・醤油を加え煮立てる。", "野菜・豆腐を入れ蓋して5分。", "〆に残りご飯と卵で雑炊にして食材使い切り。"], "tip": "残り野菜を全部使い切れる最強レシピ。"}, {"title": "【冷凍仕込み】唐揚げ", "day": "土・仕込み→平日昼", "ts": false, "easy": false, "srv": "4〜5食分", "ingr": [{"n": "鶏もも肉", "q": "600g"}, {"n": "醤油", "q": "大さじ3"}, {"n": "みりん", "q": "大さじ2"}, {"n": "酒", "q": "大さじ2"}, {"n": "にんにく", "q": "2片"}, {"n": "生姜", "q": "1片"}, {"n": "片栗粉", "q": "大さじ4"}, {"n": "小麦粉", "q": "大さじ2"}], "steps": ["鶏もも肉を一口大に切る。", "醤油・みりん・酒・にんにく・生姜をもみ込んで30分漬ける。", "片栗粉と小麦粉を合わせてまぶす。", "170℃の油で4分→200℃で1分の二度揚げ。", "粗熱が取れたらジップロックに並べて冷凍。", "食べるときはレンジ600W2分後、トースターで2分カリッと仕上げる。"], "tip": "二度揚げで冷凍後もカリッと仕上がる。"}, {"title": "【冷凍仕込み】ミートボール", "day": "土・仕込み→平日昼", "ts": false, "easy": false, "srv": "4〜5食分", "ingr": [{"n": "豚ひき肉", "q": "400g"}, {"n": "玉ねぎ", "q": "1/2個"}, {"n": "卵", "q": "1個"}, {"n": "パン粉", "q": "大さじ3"}, {"n": "塩コショウ", "q": "少々"}, {"n": "ケチャップ", "q": "大さじ3"}, {"n": "ウスターソース", "q": "大さじ2"}, {"n": "砂糖", "q": "小さじ1"}], "steps": ["玉ねぎをみじん切りにしてレンジ2分加熱し冷ます。", "ひき肉・玉ねぎ・卵・パン粉・塩コショウをよく練る。", "一口大に丸めてフライパンで全面焼き色をつける。", "ケチャップ・ソース・砂糖を合わせたたれを絡めて煮詰める。", "粗熱が取れたら冷凍保存。レンジ600W2〜3分で解凍。"], "tip": "ソースを絡めて冷凍するとご飯に乗せるだけで即完成。"}, {"title": "【下味冷凍】豚しょうが焼き", "day": "日・仕込み→平日夜", "ts": true, "easy": true, "srv": "2〜3食分", "ingr": [{"n": "豚ロース薄切り", "q": "300g"}, {"n": "醤油", "q": "大さじ2"}, {"n": "みりん", "q": "大さじ2"}, {"n": "酒", "q": "大さじ1"}, {"n": "生姜", "q": "1片"}, {"n": "砂糖", "q": "小さじ1"}], "steps": ["豚ロースを食べやすい大きさに切る。", "醤油・みりん・酒・すりおろし生姜・砂糖を合わせる。", "肉とたれをジップロックに入れてよく揉み込む。", "空気を抜いて冷凍保存（2週間保存可）。", "使うときは前夜に冷蔵庫へ移して解凍→フライパンで焼くだけ。"], "tip": "解凍してそのまま焼くだけ。キャベツと一緒に炒めれば完璧なつまみ夕食。"}, {"title": "【下味冷凍】鶏照り焼き", "day": "日・仕込み→平日夜", "ts": true, "easy": true, "srv": "2〜3食分", "ingr": [{"n": "鶏もも肉", "q": "300g"}, {"n": "醤油", "q": "大さじ2"}, {"n": "みりん", "q": "大さじ2"}, {"n": "酒", "q": "大さじ1"}, {"n": "砂糖", "q": "大さじ1"}, {"n": "にんにく", "q": "1片"}], "steps": ["鶏もも肉を大きめの一口大に切る。", "醤油・みりん・酒・砂糖・すりおろしにんにくを合わせる。", "肉とたれをジップロックに入れてよく揉み込む。", "空気を抜いて冷凍保存（2週間保存可）。", "使うときは前夜に冷蔵庫へ移して解凍→皮目から焼いてたれを絡めるだけ。"], "tip": "冷凍中にも味が染み込むので焼き立てが旨い。"}, {"title": "【冷蔵常備菜】ひじき煮", "day": "土・仕込み→週前半の昼", "ts": false, "easy": true, "srv": "4〜5食分（冷蔵4日）", "ingr": [{"n": "ひじき（乾）", "q": "30g"}, {"n": "油揚げ", "q": "1枚"}, {"n": "にんじん", "q": "1/3本"}, {"n": "醤油", "q": "大さじ2"}, {"n": "みりん", "q": "大さじ2"}, {"n": "砂糖", "q": "大さじ1"}, {"n": "だし", "q": "200ml"}], "steps": ["ひじきを水で20分戻して水気を切る。", "油揚げを短冊切り、にんじんを細切りにする。", "鍋にごま油を熱し全て炒め合わせる。", "だし・醤油・みりん・砂糖を加えて汁気がなくなるまで中火で煮る。"], "tip": "ご飯との相性抜群。冷蔵4日保存可。"}, {"title": "【冷蔵常備菜】きんぴらごぼう", "day": "日・仕込み→週後半の昼", "ts": false, "easy": true, "srv": "4〜5食分（冷蔵4日）", "ingr": [{"n": "ごぼう", "q": "1本"}, {"n": "にんじん", "q": "1/3本"}, {"n": "醤油", "q": "大さじ2"}, {"n": "みりん", "q": "大さじ2"}, {"n": "砂糖", "q": "大さじ1"}, {"n": "ごま油", "q": "大さじ1"}, {"n": "唐辛子", "q": "1本"}, {"n": "白ごま", "q": "少々"}], "steps": ["ごぼうはささがきにして水にさらす（5分）。にんじんは細切り。", "フライパンにごま油と唐辛子を熱しごぼうから炒める。", "にんじんを加えてさらに炒め、醤油・みりん・砂糖を加えて汁気がなくなるまで炒める。", "白ごまをふって完成。冷蔵4日保存可。"], "tip": "しっかり炒めることで日持ちが良くなる。"}, {"title": "【冷蔵常備菜】卵焼き", "day": "土・仕込み→週前半の昼", "ts": false, "easy": true, "srv": "3〜4食分（冷蔵3日）", "ingr": [{"n": "卵", "q": "4個"}, {"n": "だし", "q": "大さじ3"}, {"n": "醤油", "q": "小さじ1"}, {"n": "砂糖", "q": "大さじ1"}, {"n": "塩", "q": "少々"}, {"n": "サラダ油", "q": "適量"}], "steps": ["卵・だし・醤油・砂糖・塩をよく混ぜる。", "卵焼き器に油を熱し卵液を1/3ずつ流し込みながら巻いていく（3回）。", "巻きすで形を整えて粗熱を取る。", "切り分けて冷蔵保存（3日）。"], "tip": "だし巻き卵は冷たくても旨い。昼食の主役になれる常備菜。"}], "condiments": [{"n": "醤油", "a": "大サイズ推奨", "e": 300}, {"n": "みりん", "a": "大サイズ推奨", "e": 300}, {"n": "料理酒", "a": "大サイズ推奨", "e": 200}, {"n": "砂糖", "a": "1kg", "e": 200}, {"n": "塩", "a": "1袋", "e": 100}, {"n": "サラダ油", "a": "大サイズ推奨", "e": 300}, {"n": "ごま油", "a": "1本", "e": 300}, {"n": "味噌", "a": "750g", "e": 250}, {"n": "酢", "a": "1本", "e": 200}, {"n": "鶏ガラスープの素", "a": "1袋", "e": 300}, {"n": "片栗粉", "a": "1袋", "e": 150}, {"n": "小麦粉", "a": "1袋", "e": 150}, {"n": "パン粉", "a": "1袋", "e": 150}, {"n": "白ごま", "a": "1袋", "e": 150}, {"n": "コショウ", "a": "1本", "e": 150}, {"n": "めんつゆ", "a": "1本", "e": 300}, {"n": "ポン酢", "a": "1本", "e": 250}, {"n": "豆板醤", "a": "1本", "e": 200}, {"n": "ごまだれ", "a": "1本", "e": 250}, {"n": "ウスターソース", "a": "1本", "e": 200}, {"n": "ケチャップ", "a": "1本", "e": 200}, {"n": "オイスターソース", "a": "1本", "e": 200}, {"n": "だし昆布", "a": "1袋", "e": 200}, {"n": "だし（顆粒）", "a": "1袋", "e": 200}, {"n": "唐辛子（乾燥）", "a": "1袋", "e": 100}, {"n": "バター", "a": "1箱", "e": 300}], "settings": {"budget_target": 4200}};
async function writeData(){
  const url = document.getElementById('fb-url').value.trim();
  const btn = document.getElementById('btn');
  const result = document.getElementById('result');
  btn.disabled = true;
  result.textContent = '書き込み中...';
  result.className = 'result';
  try {
    const res = await fetch(url + '/kendate.json', {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(DATA)
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    result.textContent = '✅ 書き込み完了！アプリをリロードしてください。';
    result.className = 'result ok';
  } catch(e) {
    result.textContent = '❌ エラー: ' + e.message;
    result.className = 'result err';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
